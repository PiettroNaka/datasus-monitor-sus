<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Space+Grotesk:wght@500&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        html, body { margin: 0; }
        .slide-container {
            width: 1280px;
            min-height: 720px; /* keep required min-height */
            background: #FFFFFF;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            color: #0F172A;
            position: relative;
            top: -8px; /* shift up to avoid page overflow from default body spacing */
        }
        .accent-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: #3B82F6;
        }
        .content-block {
            text-align: center;
            padding-top: 40px; /* keep title top padding as required */
        }
        h1 {
            font-size: 64px;
            margin-bottom: 20px;
            color: #0F172A;
        }
        .subtitle {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 32px;
            color: #334155;
            margin-bottom: 24px; /* reduced to save vertical space */
        }
        .tools {
            font-family: 'Space Mono', monospace;
            font-size: 20px;
            color: #3B82F6;
            background: #F1F5F9;
            padding: 10px 20px;
            border-radius: 8px;
            display: inline-block;
        }
        .footer {
            position: absolute;
            bottom: 40px; /* moved up slightly to compact layout */
            font-family: 'Space Mono', monospace;
            font-size: 18px;
            color: #334155;
            display: flex;
            gap: 40px;
        }
        .divider {
            width: 200px;
            height: 2px;
            background: #F59E0B;
            margin: 16px auto; /* reduced margin */
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="accent-bar"></div>
        <div class="content-block">
            <h1>Monitoramento DATASUS</h1>
            <div class="subtitle">Produção Hospitalar e Ambulatorial (SIH/SIA)</div>
            <div class="divider"></div>
            <div class="tools">Python • Playwright • SQLite • Streamlit • LaTeX</div>
        </div>
        <div class="footer">
            <span>Autor: Manus AI</span>
            <span>Data: Abril de 2026</span>
        </div>
    </div>
</body>
</html>
